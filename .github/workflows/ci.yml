name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # App: lint, typecheck, unit/component tests, production build.
  # --------------------------------------------------------------------------
  app:
    name: App checks
    runs-on: ubuntu-latest
    env:
      # Public build-time values (dummy — no secrets needed for a build).
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate-env
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # --------------------------------------------------------------------------
  # Database: apply migrations to a local Supabase and run the pgTAP suite.
  # --------------------------------------------------------------------------
  database:
    name: Database (pgTAP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start Supabase
        run: supabase start
      - name: Apply migrations + seed
        run: supabase db reset --no-seed=false
      - name: Run pgTAP tests
        run: supabase test db
      - name: Stop Supabase
        if: always()
        run: supabase stop

  # --------------------------------------------------------------------------
  # End-to-end: Playwright against the production build.
  # --------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: app
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
