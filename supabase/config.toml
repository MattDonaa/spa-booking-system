# Supabase local project configuration.
# See https://supabase.com/docs/guides/cli/config for the full reference.

project_id = "spa-booking-system"

[db]
# Port for the local Postgres database.
port = 54322
# Major version of Postgres. Must match the deployed project.
major_version = 15

[db.migrations]
# Directory holding SQL migration files, applied in lexicographic order.
schema_paths = []

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
site_url = "http://localhost:3000"

# Injects the application role (client/practitioner/admin) into the JWT as the
# `user_role` claim. Implemented by private.custom_access_token_hook.
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/private/custom_access_token_hook"

[studio]
enabled = true
port = 54323

# ----------------------------------------------------------------------------
# Edge Functions
# ----------------------------------------------------------------------------
# Authenticated payment endpoints require a valid Supabase JWT.
[functions.payments-initiate]
verify_jwt = true

[functions.payments-refund]
verify_jwt = true

# The provider webhook is called by PayFast/Ozow, which do not send a JWT.
# Authenticity is established by verifying the provider signature instead.
[functions.payments-webhook]
verify_jwt = false

# Invoked by pg_cron via pg_net; authorized by the service-role key header.
[functions.notifications-dispatch]
verify_jwt = false
